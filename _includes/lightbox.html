<div class="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" aria-hidden="true">
  <div class="lightbox__backdrop"></div>
  <div class="lightbox__content">
    <button class="lightbox__close" aria-label="Close photo viewer">
      <svg viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    <button class="lightbox__nav lightbox__nav--prev" aria-label="Previous photo">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
    </button>
    <img class="lightbox__img" src="" alt="" loading="lazy" />
    <button class="lightbox__nav lightbox__nav--next" aria-label="Next photo">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
    </button>
    <span class="lightbox__counter" aria-live="polite"></span>
    <span class="lightbox__caption"></span>
  </div>
</div>
